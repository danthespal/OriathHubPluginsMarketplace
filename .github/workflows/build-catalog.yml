name: Build catalog output.json

# Lives in the CATALOG repo (OriathHubPluginsMarketplace).
# Pulls the DataProcessor tool from its own repo, runs it on this repo's source.json, and publishes
# the processed output.json to this repo's `data` branch (what the marketplace reads).

on:
  push:
    branches: [ main ]
    paths:
      - 'source.json'
  schedule:
    - cron: '37 1/2 * * *'
  workflow_dispatch:

concurrency:
  group: catalog-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout catalog (this repo)
        uses: actions/checkout@v4

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data

      - name: Checkout DataProcessor tool
        uses: actions/checkout@v4
        with:
          repository: danthespal/PluginsMarketplaceDataProcessor
          path: tool

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build DataProcessor
        run: dotnet publish tool/DataProcessor/DataProcessor.csproj -c Release -o dp_out

      - name: Generate output.json
        env:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet dp_out/DataProcessor.dll build source.json > data/output.json

      - name: Sign and commit to data branch
        working-directory: data
        env:
          CATALOG_SIGNING_KEY: ${{ secrets.CATALOG_SIGNING_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.json
          if git diff --cached --quiet; then
            echo "No catalog changes."
            exit 0
          fi
          # Detached ECDSA P-256 signature over the exact output.json bytes the marketplace verifies
          # (openssl DER == .NET DSASignatureFormat.Rfc3279DerSequence, SHA-256). The private key only
          # ever exists as the CATALOG_SIGNING_KEY secret and is shredded right after signing.
          if [ -n "$CATALOG_SIGNING_KEY" ]; then
            printf '%s\n' "$CATALOG_SIGNING_KEY" > ../signing_key.pem
            openssl dgst -sha256 -sign ../signing_key.pem -out output.json.sig output.json
            rm -f ../signing_key.pem
            git add output.json.sig
            echo "Signed output.json -> output.json.sig"
          else
            echo "::warning::CATALOG_SIGNING_KEY not set; committing unsigned catalog (clients treat it as unverified)."
          fi
          git commit -m "Update output.json from ${{ github.sha }}"
          git push
